惱時莎底苾芻苦毒消散身得安隱從地而起與具壽阿難陀俱詣佛所禮雙足已在一面住爾時世尊告阿難陀由此因緣汝當普告四衆苾芻苾芻尼塢波索迦塢波斯迦及國王大臣世間人等勸令一心受持此法為他人說書寫經卷在處流通當令嚴飾建立壇場香花飲食隨分供養令一切有情離諸憂惱得福無量常獲安樂壽命百年爾時世尊說是經已人天藥叉及諸鬼魅奉佛教敕不敢違越皆起慈心護持經者時具壽阿難陀及諸大衆天龍藥叉彥達嚩阿蘇羅摩嚕多蘖嚕拏緊那囉摩護囉誐人非人等聞佛所說皆大歡喜信受奉行天阿蘇羅藥叉等來聽法者應至心擁護佛法使長存各各勤行世尊教諸有聽徒來至此或在地上或居空常於人世起慈心晝夜自身依法住願諸世界常安隱無邊福智益群生所有罪業並消除遠離衆苦歸圓寂恆用戒香塗瑩體常持定服以資身菩提妙華遍莊嚴隨所住處常安樂
