body:
  text: 佛母大金曜孔雀明王經序佛母大孔雀明王經者牟尼大仙之靈言也總持真句悲救要門綰悉地之玄宗息波瀾之苦海二十八部之神衆同誓護於斯經羅剎吞毒之都軍發慈心而警衛藥叉大將數窮百姟動石擎山散支為首捧香花於舍衛起淨念於祇林禮明行之牟尼欣所談之深法樂餐禪悅希甘露以洗心佛乃悲愍將來託莎底而演教自陳因地為彼鳥王被羂網羅命如懸露忽思古聖無上覺皇演陀羅尼能超衆苦發聲應念繫縛氷銷適樂青空翔騰自在迄於成佛酬彼曩因逝多林中述斯密教咨嗟末代蠢蠢含靈去聖遠遙運生像季多逢留難異種魔生修行者被惑情迷居家者衆邪為患妖祇祳怪常現災祥若不此經何威能制是以多聞慶喜親奉聖言結集貝多周傳沙界然此支那數朝翻譯民雖遭難尚未遍宣即蓋緣往時譯者詞質而文梗潤文者闕方便之妙言雖聖旨不乖尋讀者引肩而翥目今所譯者即中天竺國三藏國師和尚不空善唐梵之言窮五天之教來於此國敕令於大明宮乃譯此經勒成三卷題云佛母大金曜孔雀明王經矣莫不廣開佛日高照重昏祕密真詮遍流同益靈符既顯萬障自袪法藥普施業患永滅願此法燈常耀總法界而清安聖壽千春保金枝而長茂天龍警護法化恆宣佛敕流暉塵劫不朽此經須知大例若是尋常字體傍加口者即須彈舌道之但為此方無字故借音耳餘自準可依字直説不得漫有聲勢致使本音即便乖梵韻又讀誦時聲合長短字有輕重看注四聲而讀終須師授方能愜當又須粗識字義呼之始可隨情若至我某甲處咸須具述所求之事然此經有大神力求者皆驗五天之地南海十洲及北方吐貨羅等二十餘國無問道俗有小乘大乘者皆共遵敬讀誦求請咸蒙福利交報不虛但為舊經譯文有闕致使神洲不多流布雖遭厄難讀誦者尚稀故今綜尋諸部梵本勘會委的更重詳審譯成三卷并畫像壇場軌式利益無邊傳之永代耳讀誦佛母大孔雀明王經前啓請法開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯南謨母馱野南謨達磨野南謨僧伽野南謨七佛正遍知者南謨慈氏菩薩等一切菩薩摩訶薩南無獨覺聲聞四向四果我皆敬禮如是等聖衆我今讀誦摩訶摩瑜利佛母明王經我所求請願皆如意所有一切諸天靈祇或居地上或處虛空或住於水異類鬼神所謂諸天及龍阿蘇羅摩嚕多蘖嚕拏彥達嚩緊那羅摩護囉誐藥叉囉剎娑畢㘑多比舍遮矩畔拏步多布單那羯吒布單那塞建那嗢摩那車耶阿鉢娑麼囉塢娑怛囉迦及餘所有一切鬼神及諸蠱魅人非人等諸惡毒害一切不祥一切惡病一切鬼神一切使者一切怨敵一切恐怖一切諸毒及諸呪術一切厭禱伺斷他命起毒害心行不饒益者皆來聽我讀誦佛母大孔雀明王經捨除暴惡咸起慈心於佛法僧生清淨信我今施設香花飲食願生歡喜咸聽我言怛儞也二合他去引一迦引里迦囉引里二矩畔引膩三餉棄𩕳四迦麼攞引乞史二合賀引哩引底五賀哩計引施室哩二合引麼底六賀哩氷卑孕反誐黎攬迷七鉢囉二合攬迷八迦去攞播引勢九迦囉戍引娜哩十焰摩怒引底十一摩賀囉引乞灑二合枲十二部多孽囉二合薩𩕳十三鉢囉二合底引砌引𤚥十四補澀喯二合度引喯十五引巘淡末鄰十六左娜引瀉引弭十七囉乞灑二合他麼麼某甲十八颯跛哩嚩引覽十九薩嚩婆去喻引鉢捺囉二合吠毗藥二合二十弭引嚩覩𮧬囉灑二合捨耽二十一鉢設都二十二捨囉喃引捨單二十三悉鈿覩二十四滿怛囉二合鉢娜娑嚩二合賀二十五引諸如是等一切天神咸來集會受此香花飲食發歡喜心擁護於我某甲并諸眷屬所有厄難一切憂惱一切疾病一切飢饉獄囚繫縛恐怖之處悉皆解脫壽命百歲願見百秋明力成就所求願滿
