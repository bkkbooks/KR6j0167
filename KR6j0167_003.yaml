body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯佛告阿難陀過去七佛正遍知者亦復隨喜宣說佛母明王真言汝當受持微鉢尸如來正遍知者亦隨喜宣說此佛母大孔雀明王真言曰怛儞也二合他一阿囉嬭二迦囉嬭三麼嬭四麼娜儞馱寧五阿上嚩㘑六捨嚩㘑七覩㘑覩㘑八母㘑母㘑九捨嚩㘑十鉢囉拏二合捨嚩㘑十一戶止十二戶止十三戶止十四戶止十五戶止十六娑嚩二合引賀引十七復次阿難陀尸棄如來正遍知者亦隨喜宣說此佛母大孔雀明王真言曰怛儞也二合他去一一𪘨弭𪘨二齲㘑三尾齲㘑四呬里五弭哩六計覩母黎七暗嚩㘑八引暗嚩㘑引嚩底丁以反九努謎怒引努謎十呬里呬里十一矩止矩止十二母止母止十三娑嚩二合賀十四引復次阿難陀毗舍浮如來正遍知者亦隨喜宣說此佛母大孔雀明王真言曰怛儞也二合他引一慕引哩慕哩二計跛知三滿膩滿膩底計四賀㘑賀㘑五佉㘑六伽㘑七頗上㘑八頗黎九頗里𩕳難上帝十難底𩕳十一難底黎十二捨迦知麼迦知十三曩嬭十四曩膩𩕳十五試哩試哩十六試哩試哩十七娑嚩二合引賀十八引復次阿難陀羯句忖那如來正遍知者亦隨喜宣說此佛母大孔雀明王真言曰怛儞也二合他引一呬膩二弭膩三矩膩母膩四覩膩五頞嬭難上帝六難底黎七爍迦哩八斫迦哩九他上誐哩十多去誐哩十一建左寧十二建引左曩引嚩底十三嚩㘑嚩㘑十四嚩㘑嚩㘑十五難帝悉地十六娑嚩二合引賀十七引復次阿難陀羯諾迦牟尼如來正遍知者亦隨喜宣說此佛母大孔雀明王真言曰怛儞也二合他引一難上多黎二怛多黎三怛多黎四多羅妬引多上黎五味引㘑尾惹曳六平引尾孺引馱㘑七阿囉薺惹曳反八尾囉薺尾囉惹麼斯九麼底十麼里十一麼引里𩕳十二門上嬭引試囉門上嬭十三入嚩二合引黎十四入嚩二合引黎十五入嚩二合黎十六跋捺囉二合嚩底十七悉地娑嚩二合引賀十八引復次阿難陀迦攝波如來正遍知者亦隨喜宣說此佛母大孔雀明王真言曰怛儞也二合他一引頞拏上㘑二建拏㘑三曼拏㘑四騫去拏㘑五𭨚謀六𭨚謀曩儞七𭨚謀嚩底八滿帝曼膩底計九阿麼㘑十僧思孕反係十一賀囉賀囉十二賀囉賀囉十三跛輸跛輸跛輸十四跛輸跛輸十五鉢底悉底娑嚩二合引賀引十六阿難陀我釋迦牟尼如來正遍知者亦隨喜宣說此佛母大孔雀明王真言為欲利益諸有情故真言曰怛儞也二合他引一呬哩弭哩二枳哩弭哩三伊上里黎四羯怛黎五計覩嚩黎六阿拏麼里七納脾聶脾八沒薩囉計九沒薩𪘨十怛囉二合騫禰十一迦引麼哩十二劍母捺哩二合十三怛嚕怛嚕十四嚩囉抳十五鉢囉二合訖哩二合底能上瑟𪘨二合十六弭里多黎十七伊上底賀引細十八阿左黎十九咄多黎二十嚩枳黎二十一嚩致嚩致底計二十二拶吒膽吠若祈雨時應云嚩囉灑二合覩禰嚩若息災求願之時應云悉鈿覩滿怛羅二合鉢那二十三曩謨婆去誐嚩妬二十四引伊上哩惹曳二十五遇引怒呬迦引曳二十六勃陵二合誐引里迦曳二十七阿嚕止二十八曩引嚕止二十九捺𪘨三十捺𪘨嚩日㘑二合三十一捺吒嚩日㘑二合引三十二嗢娜野納畢哩二合曳三十三阿攞跢引黎三十四矩攞多夜三十五引那引囉野抳三十六鉢捨𩕳三十七娑鉢二合捨𩕳三十八悉鈿覩三十九捺囉二合弭拏引四十滿怛囉二合鉢娜四十一引娑嚩二合引賀四十二引阿難陀我已教汝受持佛母大孔雀明王法救莎底苾芻蛇毒之難令彼苾芻獲得安隱亦令一切有情讀誦受持是經獲大安樂壽命百年所求遂願已如前說復次阿難陀慈氏菩薩亦隨喜宣說此佛母大孔雀明王真言曰怛儞也二合他引一試哩試哩二試哩跋捺㘑二合三孺底孺底四孺底跋捺㘑二合五賀㘑賀㘑六賀哩抳七難上底捨嚩㘑八試吠九戍囉播引抳𩕳十引地引地十一引地冒引地十二冒引地薩怛吠二合十三冒引地鉢哩播引左抳引曳娑嚩二合引賀引十四阿難陀索訶世界主大梵天王亦隨喜宣說此佛母大孔雀明王真言曰怛儞也二合他引一呬哩呬哩二弭哩弭哩三麼哩𩕳葬迦哩四枳哩枳哩五枳哩枳哩六枳哩枳哩底七沒囉二合賀麼二合曳八矩囒擲計九尾拏訶普細十馱囉馱囉十一賀攞賀攞十二普嚕普嚕十三普嚕普嚕娑嚩二合賀十四引阿難陀此真言能滅一切惡毒能除一切毒類佛力除毒菩薩摩訶薩力除毒獨覺力除毒阿羅漢力除毒三果四向聖力除毒實語者力除毒梵王杖力除毒帝釋金剛杵力除毒吠率怒輪力除毒火天燒力除毒水天羂索力除毒阿蘇羅幻士力除毒龍王明力除毒嚕捺囉三戟叉力除毒塞騫那爍底力除毒佛母大孔雀明王力能除一切諸毒令毒入地令我某甲及諸眷屬皆得安隱阿難陀復有一切毒類汝應稱彼名字所謂跋磋那婆毒訶羅遏囉毒迦羅俱吒毒牙齒毒螫毒根毒末毒疑毒眼毒電毒雲毒蛇毒龍毒蠱毒魅毒一切鼠毒蜘蛛毒象毒蝦蟆毒蠅毒及諸蜂毒人毒人非人毒藥毒呪毒如是等一切諸毒願皆除滅令我某甲及諸眷屬悉除諸毒獲得安隱壽命百年願見百秋阿難陀帝釋天王亦隨喜宣說此佛母大孔雀明王真言曰怛儞也二合他一若邏二膳覩黎三麼引羅引膳覩黎四佐閉胝五膳覩黎六末他上𩕳七伽引多𩕳八仡囉二合薩𩕳九賀哩十矢哩十一儞庾二合底失哩十二怛嚕但嚕拏上嚩底十三賀引賀引賀引賀引賀引十四僧思孕反係十五地底十六地底十七矩嚕矩嚕十八尾囉惹十九咄吒咄吒枲二十𮧬吒𮧬吒枲二十一悉哩悉哩二十二劫比黎二十三劫比羅母黎二十四賀呬引馨異反護引二十五薩嚩訥瑟吒二合二十六鉢囉二合訥