藥勿相侵損我今依法結其地界結方隅界除諸憂惱壽命百歲願度百秋復次阿難陀有大藥叉王及諸藥叉將住大海邊或住妙高山及餘諸山或居曠野或住諸河川澤陂池尸林坎窟村巷四衢園苑林樹或居餘處有大藥叉住阿拏挽多大王都處如是等衆成願以此佛母大孔雀明王陀羅尼擁護於我某甲并諸眷屬壽命百年即説陀羅尼曰怛儞也二合他去一賀哩賀哩抳二佐里引佐里𩕳三怛囉二合跛抳四謨賀𩕳五娑擔二合婆𩕳六咱婆𩕳七娑嚩二合演僕引八娑嚩二合賀引九復次阿難陀東方有大天王名曰持國是彥達嚩主以無量百千彥達嚩而為眷屬守護東方彼有子孫兄弟軍將大臣雜使如是等衆彼亦以此佛母大孔雀明王陀羅尼擁護於我某甲并諸眷屬為除憂惱壽命百歲願見百秋陀羅尼曰怛儞也二合他一粗粗嚕二粗粗嚕三粗粗引嚕四粗粗引嚕五粗粗引嚕六粗引嚕粗引嚕七粗引嚕謎娑嚩二合賀八復次阿難陀南方有大天王名曰增長是矩畔拏主以無量百千矩畔拏而為眷屬守護南方彼有子孫兄弟軍將大臣雜使如是等衆彼亦以此佛母大孔雀明王陀羅尼擁護於我某甲并諸眷屬為除憂惱壽命百歲願見百秋陀羅尼曰怛儞也二合他一吠嚕計吠嚕計二阿蜜怛囉二合加引多上𩕳三嚩嚕拏嚩底四吠努鼻音麼引里𩕳五吠哩𩕳六補怛哩二合計七祖去祖唧祖八娑嚩二合賀引九復次阿難陀此西方有大天王名曰廣目是大龍主以無量百千諸龍而為眷屬守護西方彼有子孫兄弟軍將大臣雜使如是等衆彼亦以此佛母大孔雀明王陀羅尼擁護於我某甲并諸眷屬為除憂惱壽命百歲願見百秋陀羅尼曰怛儞也二合他一吠努哩吠努哩二麼置帝麼置帝三句引胝句引胝四尾儞庾二合麼底五護護護護護護護護六護嚕護嚕護嚕護嚕護嚕護嚕護嚕護嚕七祖祖祖祖祖祖祖祖八左左左左左左左左嚧引娑嚩二合賀九復次阿難陀北方有大天王名曰多聞是藥叉主以無量百千藥叉而為眷屬守護北方彼有子孫兄弟軍將大臣雜使如是等衆彼亦以此佛母大孔雀明王陀羅尼擁護於我某甲并諸眷屬為除憂惱壽命百歲願見百秋陀羅尼曰怛儞也二合他引一素引哩素引哩二施哩施哩三麼底賀哩四賀哩麼底五迦哩哩六賀哩哩七閉嚕閉嚕八氷誐黎九祖魯祖魯十鈍度麼底十一賀單尾衫十二鈍度麼底娑嚩二合賀引十三東方名持國南方號增長西方名廣目北方名多聞天此四大天王護世有名稱四方常擁護大軍具威德外怨悉降伏他敵不能侵神力有光明常無諸恐怖天與阿蘇羅或時共鬪戰此等亦相助令天勝安隱如是等大衆亦以此明王護我并眷屬無病壽百歲陀羅尼曰怛儞也二合他一噎隸謎隸二底哩謎隸三嚩引勢努鼻迷努鼻努迷若祈雨時應稱此四句嚩囉灑二合覩禰嚩三滿帝曩若息災祈願時應云某甲并諸眷屬求所願滿五呬哩弭里六頓吠覩頓吠七頞𪘜嚩𪘜八路跛囉麼努嚩𪘜九嚩囉灑二合覩禰務十誐嚕彥跢引野十一頓嬭覩頓嬭十二鏃計穆計十三伊上哩膩十四弭里膩十五呬里呬黎十六護魯護黎十七呬哩弭里十八覩黎多嚕里娑嚩二合引賀引十九天阿蘇羅藥叉等來聽法者應志心擁護佛法使長存各各勤行世尊敦諸有聽徒來至此或在地上或居空常於人世起慈心晝夜自身依法住願諸世界常安隱無邊福智益群生所有罪障並消除遠離衆苦歸圓寂恆用戒香塗瑩體常持定服以資身菩提妙花遍莊嚴隨所住所常安樂
