body:
  text: 如是我聞一時薄伽梵在室羅伐城逝多林給孤獨園時有一苾芻名曰莎底出家未久新受近圓學毗奈耶教為衆破薪營澡浴事有大黑蛇從朽木孔出螫彼苾芻右足拇指毒氣遍身悶絶于地口中吐沫兩目翻上爾時具壽阿難陀見彼苾芻為毒所中極受苦痛疾往佛所禮雙足已而白佛言世尊莎底苾芻為毒所中受大苦惱具如上説如來大悲云何救護作是語已爾時佛告阿難陀我有摩訶摩瑜利佛母明王大陀羅尼有大威力能滅一切諸毒怖畏災惱攝受覆育一切有情獲得安樂汝持我此佛母明王陀羅尼為莎底苾芻而作救護為結地界結方隅界令得安隱所有苦惱皆得消除彼等或為天龍所持阿蘇羅所持摩嚕多所持孽嚕拏所持彥達嚩所持緊那囉所持摩護囉誐所持藥叉所持囉剎娑所持畢㘑多所持毗舍遮所魅步多所魅矩畔拏所魅布單那所魅羯吒布單那所魅塞建那所魅嗢麼那所魅車耶所魅阿鉢娑麼羅所魅塢娑跢囉迦所魅為如是等所執所魅之時佛母明王悉能加護令無憂怖壽命百年或被他人厭禱呪術蠱魅惡法之類所謂訖哩底迦羯摩拏迦具囉那枳囉拏吠哆拏質者飲他血髓變人驅役呼召鬼神造諸惡業惡食惡吐惡影惡視惡跳惡驀或造厭書或惡逆作如是惡事欲相惱亂者此佛母明王擁護彼人并諸眷屬如是諸惡不能為害又復瘧病一日二日三日四日乃至七日半月一月或復頻日或復須臾一切瘧病四百四病或常熱病偏邪病癭病鬼神壯熱風黃痰癊或三集病飲食不消頭痛半痛眼耳鼻痛脣口頰痛牙齒舌痛及咽喉痛胸脅背痛心痛肚痛腰痛腹痛髀痛膝痛或四肢痛隱密處痛遍身疼痛如是過患悉皆除滅願護於我某甲并諸眷屬我結地界結方隅界讀誦此經悉令安隱即説伽他曰令我夜安晝日亦安一切時中諸佛護念即説陀羅尼曰怛儞也二合他引一伊上膩二尾膩三枳膩四呬膩五弭膩六𩕳膩七頞嬭八伽引上嬭九努誐嬭十賀哩抳十一嚩麌膩十二膀引蘇比舍止𩕳十三阿去嚧引賀抳十四污嚧賀抳十五曀㘑十六謎㘑十七帝㘑十八底里底里十九謎㘑謎㘑二十底謎底謎二十一努謎努謎二十二伊上置弭置二十三尾瑟吒二合睇二十四左跛㘑二十五尾麼㘑二十六尾麼㘑二十七護嚕護嚕二十八阿濕嚩二合目棄二十九引迦引里三十麼賀引迦里三十一鉢囉二合枳引囉拏二合計施三十二矩嚕矩嚕三十三嚩引具嚕三十四句引嚕句引嚕三十五護嚕護嚕三十六嚩譜嚕三十七度引娑上引努鼻嚩三十八怒引努鼻嚩三十九引怒引麼弩嚩四十引遇引攞夜引四十一跋攞夜引四十二比輸比輸四十三呬哩呬哩四十四弭里弭里四十五底里底里四十六鼻里鼻里四十七祖魯祖魯四十八母護母護母護四十九母護母護五十母魯母魯五十一母魯母魯母魯五十二護護護護護護護護護護五十三嚩引嚩引嚩引嚩引嚩引嚩引嚩引嚩引嚩引嚩引五十四攞惹引攞惹引攞惹引攞惹引攞惹引攞惹引攞惹引攞惹引攞惹引攞惹引五十五娜麼娜麼𩕳五十六答跛答跛𩕳五十七入嚩二合引攞入嚩二合引攞𩕳五十八鉢左鉢左𩕳五十九懶努鼻六十蘗惹𩕳六十一𮧬囉灑二合抳六十二颯普二合吒𩕳六十三跢跛𩕳六十四播引左𩕳六十五賀哩抳六十六馱哩抳迦引哩抳六十七劍跛𩕳六十八沫那𩕳六十九曼膩底計七十麼迦哩七十一設迦哩七十二羯迦哩七十三爍迦哩七十四餉迦哩七十五入嚩二合攞𩕳七十六努麼七十七努鼻嚩哩七十八努銘努銘七十九遇引攞引野八十鉢哩吠攞引野八十一𮧬囉灑二合覩禰嚩無博反三滿帝曩八十二伊上里枳枲八十三娑嚩二合賀八十四若讀誦經者至此處時隨所願求皆須稱説其事若大旱時云願天降雨若大潦時云願天止雨若有兵戈盜賊疫病流行飢饉惡時及諸厄難隨事陳説一心求請無不隨意阿難陀有諸龍王名字當起慈心稱念其名攝除諸毒所謂持國龍王我慈念愛羅嚩拏常起慈尾嚕博叉亦起慈黑驕答麼我慈念麼抳龍王我慈愍婆蘇枳龍常起慈杖足龍王亦起慈滿賢龍王我慈念無熱惱池嚩嚕拏曼娜洛迦德叉迦難陀塢波難陀龍我常於彼興慈意無邊龍王我慈念嚩蘇目佉亦起慈無能勝龍常起慈𡃃嚩龍王我慈念大麼娜斯我慈念小麼娜斯亦起慈阿鉢羅羅迦洛迦有財沙彌龍王等捺地穆佉及麼抳白蓮華龍及方主羯句吒迦及蠡足毛毯馬勝等皆慈娑雞得迦供鼻羅針毛臆行龍王等哩使迦龍我慈念滿耳車面亦起慈句洛迦龍我慈念婆雌補多蘇難陀愛羅鉢多大龍王濫畝洛迦我慈愍非人龍王我慈念上人龍王亦復然蔑蘗羅龍常起慈母呰鄰那我慈念或有龍王行地上或有龍王常居空或有恆依妙高山或在水中作依止一首龍王我慈念及以二頭亦復然如是乃至有多頭此等龍王我慈念或復無足龍王類二足四足等龍王或復多足諸龍王各起慈心相護念此等龍王具威德色力豐美有名聞天與修羅共戰時有大神通皆勇猛勿使無足欺輕我二足四足勿相侵及與多足諸龍王常於我身無惱觸諸龍及神我慈念或在地上或居空常令一切諸衆生各起慈心相護念復願一切含生類及以靈祇諸大神常見一切善徵祥勿覩違情罪惡事我常發大慈悲念令彼滅除諸惡毒饒益攝受離災厄隨在時方常擁護曩謨窣覩二合沒馱野曩謨窣覩二合冒馱曳曩謨窣覩二合目訖多野曩謨窣覩二合目訖多曳曩謨窣覩二合扇多野曩謨窣覩二合扇多曳曩謨尾目訖跢二合野曩謨尾目訖跢二合曳諸有淨行者能伏諸惡業敬禮如是等於我常衛護若逢諸恐怖一切惱亂時并及災害時疾病變怪等及被毒所中不利益之時護我并眷屬無病壽百歲佛告阿難陀往昔之時雪山南面有金曜孔雀王於彼而住每於晨朝常讀誦佛母大孔雀明王陀羅尼晝必安隱暮時讀誦夜必安隱即説陀羅尼曰曩謨沒馱野一曩謨達磨野二曩謨僧去伽去野三怛儞也二合他去四護護護護護五曩誐㘑㘑六努鼻上麼㘑㘑七護野護野八尾惹野尾惹野九度蘇度蘇十麌嚕麌嚕十一曀攞謎攞十二底哩謎羅十三伊上里密怛𡃤二合十四底里密怛𡃤二合十五伊上里底里密怛𡃤二合十六努謎十七蘇努謎十八妬引蘇帝十九遇引攞吠攞二十左跛攞二十一尾麼攞二十二伊置哩二十三毗置哩二十四哩置哩二十五尾置哩二十六曩謨窣覩二合沒馱南二十七唧哩枳枲二十八遇努呬迦引二十九曩謨囉曷二合耽三十護引囉娜羅三十一嚩囉灑二合覩禰嚩三十二三滿帝曩三十三捺捨蘇儞舍引蘇三十四曩謨母馱引南三十五娑嚩二合引賀三十六引阿難陀彼金曜孔雀王忽於一時忘誦此佛母大孔雀明王陀羅尼遂與衆多孔雀婇女從林至林從山至山而為遊戲貪欲愛著放逸昏迷入山穴中捕獵怨家伺求其便遂以鳥羂縛孔雀王被縛之時憶本正念即誦如前佛母大孔雀明王陀羅尼於所緊縛自然解脫眷屬安隱至本住處復説此明王陀羅尼曰曩謨母馱引野一曩謨達麼野二曩謨僧去伽去引野三曩謨四蘇上襪囉拏二合引四嚩婆引薩寫五麼庾引囉引囉枳娘二合六曩謨摩賀麼引庾哩曳二合七尾儞也二合囉枳惹二合八怛儞也二合他引九悉第十蘇悉第十一謨左𩕳十二謨剎抳十三目訖帝二合十四尾目訖帝二合十五阿麼黎十六尾麼黏十七𩕳寧逸反麼黎十八瞢誐黎十九呬懶娘蘗陛二十囉怛曩二合蘗陛二十一跛捺㘑二合二十二蘇跋捺㘑二合二十三三滿多跋捺㘑二合二十四薩嚩引囉他二合娑引馱𩕳二十五跛羅沫引他娑引馱𩕳二十六薩嚩囉他二合鉢囉二合嚩引馱𩕳二十七薩嚩瞢誐囉娑去引馱𩕳二十八麼曩枲二十九麼曩枲三十摩賀麼引曩枲三十一曷步帝三十二頞頞窒丁結反納部二合帝三十三頞卒子律反帝三十四阿上惹㘑二合三十五尾惹㘑三十六尾麼黎三十七阿上蜜哩二合帝三十八阿上麼黎三十九阿麼囉抳四十沒囉二合憾謎二合四十一沒囉二合憾麼二合娑嚩㘑四十二布囉儜四十三布囉拏二合麼努鼻引囉剃四十四蜜哩二合多散喏引嚩𩕳四十五室哩二合引跋捺㘑二合戰捺㘑二合四十六戰捺囉二合鉢囉二合陛四十七素哩曳二合四十八素哩野二合建引帝四十九味多婆曳五十蘇𮧬𩕳五十一沒囉二合憾麼二合具引曬五十二沒囉二合憾麼二合乳瑟𪘜二合五十三薩嚩怛囉二合五十四鉢囉二合底賀帝五十五娑嚩二合賀五十六那莫薩嚩沒馱南五十七娑嚩二合娑底二合麼麼曩薩寫五十八颯跛哩嚩囉乞産二合引五十九屈勿二合引挽引覩六十喏引嚩覩六十一𮧬囉灑二合設單鉢扇覩六十二設囉難引設單六十三護呰六十四麌呰具呰畞呰六十五娑嚩二合引賀引六十六佛告阿難陀往昔金曜孔雀王者豈異人乎即我身是我今復説佛母大孔雀明王心陀羅尼曰怛儞也二合他去引一一底蜜底二底里蜜底三底里弭里蜜底四底黎比五弭里六弭里底弭七底里弭里八蘇上頓嚩引頓嚩引九蘇嚩左上十唧哩枳枲野十一牝那謎膩十二曩謨沒馱南十三唧羯枲鉢讕二合多慕黎十四一底賀嚧十五路引呬多慕黎十六膽嚩十七暗嚩十八俱置十九矩曩置二十底囉君去左曩置二十一阿拏嚩多上引野二十二𮧬囉灑二合覩禰務二十三曩嚩麼引娑去二十四娜捨麼引細底二十五一底弭哩二十六枳哩弭哩二十七計攞弭哩二十八計覩母黎二十九努努鼻迷蘇努謎嬭三十娜哩謎三十一散覩𮧬𪘜三十二畝娑𮧬𪘜三十三畝薩㘑畝薩㘑三十四曀拏嚩無博反窣多二合囉計三十五捺迦攞三十六捺迦哩謎三十七佉囉麼囉三十八企黎一底三十九薩惹黎四十覩吠四十一覩頓迷四十二頞曩𪘜四十三鉢囉二合捺𪘜二合四十四頞拏捺𪘜四十五嚩囉灑二合覩禰務曩謨娜計曩四十六散怛𪘜妬四十七三滿帝曩四十八曩引囉引野抳四十九播引囉引野抳五十賀哩多上引里五十一君哆上引里五十二伊哩蜜窣底二合五十三吉底里蜜窣底二合五十四伊上謎引悉鈿覩五十五捺囉二合引弭拏引五十六曼怛囉二合路那娑嚩二合引賀五十七阿難陀此佛母大孔雀明王心陀羅尼若復有人欲入聚落應當憶念於曠野中亦應憶念在道路中亦常憶念或在非道路中亦應憶念入王宮時憶念逢劫賊時憶念鬪諍時憶念水火難時憶念怨敵會時憶念大衆中時憶念或蛇蠍等螫時憶念為毒所中時憶念及諸怖畏時憶念風黃痰癊時憶念或三集病時憶念或四百四病一一病生時憶念若苦惱至時皆當憶念何以故若復有人應合死罪以罰物得脫應合被罰以輕杖得脫應合輕杖被罵得脫應合被罵訶責得脫應合訶責戰悚得脫應合戰悚自然解脫一切憂惱悉皆消散阿難陀此佛母大孔雀明王真言一切如來同共宣説常當受持自稱己名請求加護願攝受我某甲除諸怖畏刀杖枷鎖苦難之時願皆解脫常逢利益不值災危壽命百歲得見百秋阿難陀若有人天魔梵沙門婆羅門等讀誦受持此佛母大孔雀明王陀羅尼結其地界結方隅界請求加護一心受持者我不見有天龍鬼神能為惱害所謂天及天婦天男天女及天父母并諸朋屬如是等類無能為害若龍龍婦龍男龍女及龍父母并諸朋屬亦不能為害若阿蘇囉及婦男女父母朋屬等不能為害若麼嚕多及婦男女父母朋屬等不能為害若孽嚕拏及婦男女父母朋屬等不能為害若彥達嚩及婦男女父母朋屬等不能為害若緊那囉及婦男女父母朋屬等不能為害若摩護囉誐及婦男女父母朋屬等不能為害若