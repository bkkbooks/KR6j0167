body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空謚大鑒正號大廣智大興善寺三藏沙門不空奉詔譯佛告阿難陀汝當稱念大藥叉王及諸大藥叉將名字所謂矩吠囉長子名曰珊逝耶常乘御於人住弭癡羅國以天誠實威眾皆從乞願彼亦以此佛母大孔雀明王真言擁護我某甲并諸眷屬為除憂惱壽命百歲願見百秋即說真言曰怛儞也二合他一嚩黎二嚩勒迦二合黎三摩蹬倪四戰拏引哩五補嚕灑抳六尾唧里𩕳七遇引哩八摩引蹬倪九戰拏上引哩十麼里𩕳十一呬哩呬哩十二阿去蘖底蘖底十三彥馱引哩十四句引瑟恥二合十五迦引嚩哩十六尾賀引𩕳十七呬哩劍謎娑嚩二合賀引十八羯句忖那神波吒梨子處阿跋羅爾多住窣土奴邑賢善大藥叉住於世羅城摩那波大神常居於北界大聖金剛手住居王舍城常在鷲峰山以為依止處大神金翅鳥毘富羅山住質怛囉笈多質底目溪住薄俱羅藥叉住於王舍城營從并眷屬有大威神力大小黑藥叉劫比羅城住是釋族牟尼大師所生處斑足大藥叉吠囉耶城住摩醯首藥叉止羅多國住勿賀娑鉢底住於舍衛城娑梨囉藥叉娑雞多處住金剛杖藥叉毘舍離國住訶里氷蘖囉力士城中住大黑藥叉王婆羅拏斯國藥叉名善現住於占波城吠史怒藥叉住在墮羅國馱羅抳藥叉住於護門國可畏形藥叉住於銅色國末達那藥叉烏洛迦城住呵吒薄俱將曠野林中住劫比羅藥叉住於多稻城護世大藥叉嗢逝尼國住韈蘇步底神阿羅挽底住水天藥叉神婆盧羯泚國歡喜大藥叉住於歡喜城持鬘藥叉神住在勝水國阿難陀藥叉末羅鉢吒國白牙齒藥叉住於勝妙城堅固名藥叉末娑底國住大山藥叉王住在山城處婆颯婆藥叉住居吠儞勢羯底雞藥叉住嚧呬多國此藥叉童子名聞於大城百臂大藥叉住在頻陀山廣車藥叉神羯陵伽國住能征戰藥叉窣鹿近那國雄猛大藥叉遏祖那林住曼拏波藥叉末達那國住山峰藥叉神住於摩臘婆魯捺囉藥叉嚧呬多馬邑一切食藥叉住於奢羯羅波利得迦神少智洛雞住商主財自在住在難勝國峰牙及世賢跋娑底耶國尸婆藥叉王住食尸婆城寂靜賢藥叉住在可畏國因陀羅藥叉因陀羅國住華幢藥叉主住於寂靜城那嚕迦藥叉那嚕迦城住劫比羅藥叉常在邑城住寶賢及滿賢住梵摩伐底能摧他藥叉住建陀羅國能壞大藥叉得叉尸羅住驢皮藥叉神在於吐山住三蜜藥叉主阿努波河側發光明藥叉盧鹿迦城住喜長藥叉神呬形孕反隅摧國住婆以盧藥叉住居婆以地愛鬪諍藥叉住在濫波城蘖踏婆藥叉末土羅城住缾腹藥叉王住在楞伽城日光明藥叉住在蘇那國屼頭山藥叉住憍薩羅國勝及大勝神住在半尼國圓滿大藥叉末羅耶國住緊那羅藥叉計羅多國住護雲藥叉王住在伴拏國謇拏迦藥叉住在安立國僧迦離藥叉必登蘗哩住引樂藥叉神怛楞蘗底住孫陀羅藥叉那斯雞國住阿僧伽藥叉婆盧羯車住難儞大藥叉及子難儞迦此二藥叉王羯訶吒住迦垂腹大藥叉羯陵伽國住大臂藥叉王憍薩羅國住娑悉底迦神娑底羯吒國波洛伽藥叉常在林中住賢耳大藥叉怛胝肩國住勝財藥叉神住居陸滿國氣力大藥叉毘囉莫迦住喜見藥叉神住阿般底國尸騫馱藥叉住在牛摧國愛合掌藥叉住居吠儞勢陛瑟致得迦住在蓋形國調摩竭藥叉住在三層國廣目藥叉神住居一腋國安拏婆藥叉優曇跋羅國無功用藥叉憍閃彌羅住微盧者那神寂靜意城住遮羅底迦神住居蛇蓋國赤黃色藥叉劍畢離國住薄俱囉藥叉嗢逝訶那住布喇拏藥叉住曼拏比國𩕳迦謎沙神半遮離城住難摧大藥叉蘖度娑國住堅頰藥叉神住在水天國脯闌逝野神住居鬪戰國怛洛迦藥叉及俱怛洛迦二大藥叉王住在俱盧土大烏嚧佉羅及與迷佉羅此二藥叉王威德具名稱并與諸眷屬亦住俱盧土微帝播底神及以義成就此二藥叉王阿曳底林住往成就藥叉窣鹿近那住窣吐羅藥叉住窣吐羅國虎力師子力并大師子力俱胝年大將他勝宮中住華齒藥叉神住在占波城摩竭陀藥叉住在山行處鉢跋多藥叉瞿瑜伽處住蘇曬那藥叉那羯羅國住勇臂大藥叉娑雞多邑住能引樂藥叉住在哥乾底無勞倦藥叉住憍閃彌國賢善藥叉神住於賢善國步多面藥叉波吒離子住無憂大藥叉住在迦遮國羯徵羯吒神菴婆瑟侘住成就義藥叉住在天腋國曼那迦藥叉住在難勝國解髮藥叉神住居勝水國寶林藥叉神住先陀婆國常謹護藥叉劫毘羅國住羯吒微羯吒迦毘羅衛國慳悋藥叉神住乾陀羅國墮羅藥叉神膩攞耶堅住處中藥叉神賢善名稱住吠璃瑠藥叉堅實城中住染薄迦藥叉住居沙磧地舍多大藥叉及以毘羯吒此二藥叉神物那擿迦住毘摩尼迦神提婆設摩住曼陀羅藥叉捺羅那國住作光藥叉神羯濕彌羅國占博迦藥叉在羯吒城住半支迦藥叉羯濕彌羅國具足五百子有大軍大力長子名肩目住在支那國諸餘兄弟等憍尸迦國住牙足藥叉神羯陵迦國住曼荼羅藥叉住曼荼藥國楞伽自在神住於迦畢試摩利支藥叉羅摩脚差住達摩波羅神住在於疎勒大肩藥叉神薄佉羅國住毘沙門王子具眾德威嚴住在覩火羅有大軍大力一俱胝藥叉而為其眷屬娑多山藥叉及以雪山神此二大藥叉辛都河側住執三戟藥叉住在三層殿能摧大藥叉羯陵伽國住半遮羅獻拏達彌拏國住財自在藥叉住在師子國鸚鵡口藥叉住於曠野處兢羯娑藥叉常依地下住有光明藥叉白蓮華國住設弭羅藥叉於大城中住能破他藥叉捺羅泥國住氷蘖羅藥叉菴末離國住末末拏藥叉末末拏藏國摩怛哩藥叉住於施欲國極覺藥叉神布底嚩吒國那吒矩韈囉住於迦畢試鉢囉設囉神鉢羅多國住商羯羅藥叉住在爍迦處毘摩質多羅莫里迦城住氷羯羅藥叉羯得迦國住滿面藥叉神奔拏韈達那羯囉羅藥叉住在烏長國甕腹藥叉神憍薩羅國住摩竭幢大神住居沙磧處質怛羅細那僕迦那國住囉嚩拏藥叉羅摩陀國住赤黃色藥叉羅尸那國住樂見藥叉神鉢尼耶國住金毘囉藥叉住於王舍城常居毘富羅有大軍大力萬俱胝藥叉而為其眷屬瞿波羅藥叉住在蛇蓋國頞洛迦藥叉頞洛迦城住難提藥叉神住在難提國末里大天神住居村巷處毘沙門居住佛下寶階處遏拏挽多城億眾神圍繞如是等藥叉有大軍大力降伏他怨敵無有能勝者名稱滿諸方具足大威德天與阿修羅戰時相助力此等福德諸神大藥叉將遍贍部州護持佛法咸起慈心彼亦以此佛母大孔雀明王真言常擁護我某甲攝受饒益令得安隱所有厄難皆悉消除或為刀杖損傷或被毒中王賊水火之所逼惱或為天龍藥叉所持及諸鬼等乃至畢隷二合索迦行惡病者悉皆遠離於我某甲并諸眷屬我結地界結方隅界讀誦此經除諸憂惱壽命百歲願見百秋即說真言曰怛儞也二合他引一阿上迦𪘨二尾迦𪘨三訶哩抳四賀引哩抳五馱引囉抳馱引囉抳六護計護計七母計母計八我某甲所有病苦賀曩賀曩九賀曩賀曩十賀曩賀曩十一賀曩賀曩十二賀曩賀曩十三我某甲所有恐怖娜賀娜賀十四娜賀娜賀十五娜賀娜賀十六娜賀娜賀十七娜賀娜賀十八我某甲所有怨家跛左跛左十九跛左跛左二十跛左跛左二十一跛左跛左二十二跛左跛左二十三我某甲所有不饒益事度度度度度度度度度度二十四我某甲所有遭毒藥賀賀賀賀賀賀賀賀賀賀二十五我某甲所有他人厭禱爾呰以反置爾置二十六爾置爾置二十七爾置爾置二十八爾置爾置二十九爾置爾置三十我某甲所有罪業願皆消滅祖嚕祖嚕三十一祖嚕祖嚕三十二祖嚕祖嚕三十三祖嚕祖嚕三十四祖嚕祖嚕三十五呬哩呬哩三十六呬哩呬哩三十七呬哩呬哩三十八呬哩呬哩三十九呬哩呬哩四十弭哩弭哩四十一弭哩弭哩四十二弭哩弭哩四十三弭哩弭哩四十四弭哩弭哩四十五普嚕普嚕四十六普嚕普嚕四十七普嚕普嚕四十八普嚕普嚕四十九普嚕普嚕五十唧置唧置五十一唧置唧置五十二唧置唧置五十三唧置唧置五十四唧置唧置五十五呬計五十六弭計五十七唧計五十八尾計五十九室哩二合六十跛捺㘑二合瞢蘖黎引六十一三去滿多跛捺㘑二合六十二薩嚩引囉他二合娑去引馱𩕳六十三阿麼㘑六十四尾麼㘑六十五贊捺囉二合鉢囉二合陛六十六素引哩野二合建去引帝六十七弩鼻吠六十八怒弩吠六十九畢哩二合孕迦隷七十娑嚩二合引賀引七十一惟願諸神等常擁護我某甲并諸眷屬壽命百歲願見百秋佛告阿難陀復有二十八藥叉大將名號汝當稱念此等藥叉大將能於十方世界覆護一切眾生為除衰患厄難之事有四藥叉大將住於東方擁護東方所有眾生令離憂苦其名曰儞儞逸反伽去一蘇甯怛囉二合引二布囉拏二合迦三劫比攞四彼亦以此佛母大孔雀明王擁護我某甲并諸眷屬壽命百年說所求事皆准此阿難陀有四藥叉大將住於南方擁護南方所有眾生令離憂苦其名曰僧思孕反賀一塢跛僧賀二餉企攞三難上那四彼亦以此佛母大孔雀明王擁護我某甲并諸眷屬壽命百年此處說所求事阿難陀有四藥叉大將住於西方擁護西方所有眾生令離憂苦其名曰賀囉一賀哩計爍二鉢囉二合僕三劫比羅四彼亦以此佛母大孔雀明王擁護我某甲并諸眷屬壽命百年說所求事阿難陀有四藥叉大將住於北方擁護北方所有眾生令離憂苦其名曰馱羅拏引一馱囉難上弩二嗢儞庾二合業播路三尾瑟弩二合四彼亦以此佛母大孔雀明王擁護我某甲并諸眷屬壽命百年說所求事阿難陀有四藥叉大將各住四維擁護四維所有眾生令離憂苦其名曰半止脚一半者引羅巘拏入二娑去跢去引儗哩三彥麼嚩多四彼亦以此佛母大孔雀明王擁護我某甲并諸眷屬壽命百年說所求事阿難陀有四藥叉大將常居於地擁護所有地居眾生令離憂苦其名曰步莫一蘇上步莫二迦引囉入三塢跛迦引囉四入彼亦以此佛母大孔雀明王擁護我某甲并諸眷屬壽命百年說所求事阿難陀有四藥叉大將常在空居擁護所有空居眾生令離憂苦其名曰素引哩野二合一素謨引二阿儗𩕳二合三嚩引庾四彼亦以此佛母大孔雀明王擁護我某甲并諸眷屬壽命百年說所求事復次阿難陀汝當稱念多聞天王兄弟軍將名號此等擁護一切有情為除災禍厄難憂苦遊行世間作大利益其名曰印捺囉二合一素摩引二嚩嚕拏入三鉢囉二合惹跛底入四婆引囉納縛二合惹入五伊舍引那六室戰二合那諾七迦莫八室㘑二合瑟姹二合引矩𩕳建姹九𩕳建姹迦十嚩膩麼抳十一麼抳者囉十二鉢囉十三鉢囉二合拏引那十四塢跛半止去十五娑引跢引儗哩十六彥麼嚩多十七布囉拏二合十八佉上儞羅十九句尾諾二十遇跛引囉藥叉二十一阿上吒嚩句二十二曩囉邏引闍二十三爾捺乞灑二十四半者引囉巘拏二十五蘇母契二十六儞丁逸反伽藥叉二十七薩跛哩惹諾二十八唧怛囉二合細曩二十九濕嚩二合彥達嚩三十底哩二合頗哩三十一左怛哩二合建吒迦三十二儞伽爍底丁異反三十三室左二合麼引多哩三十四此等藥叉是大軍主統領諸神有大威力皆具光明形色圓滿名稱周遍是多聞天王法兄弟多聞天王常勅此等藥叉兄弟若諸鬼神侵擾彼人者汝等為作擁護勿使惱亂令得安樂諸藥叉聞已依教奉行此等藥叉大將亦以此佛母大孔雀明王守護於我并諸眷屬壽命百年若有鬪諍苦惱之事現我前時願藥叉大將常衛護我某甲并諸眷屬令離憂苦或為天龍所持阿蘇羅所持麼嚕多所持誐嚕拏